name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: clippy · test
    runs-on: ubuntu-latest
    # A throwaway Postgres so the store's Postgres adapter is exercised for real
    # (the `pg_live` integration test); the sqlite adapter is covered in-process.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chuktest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      # The test suite includes the lexical guards (no domain vocabulary in the
      # wire + worker crates). Note: the house style is hand-formatted by
      # convention (no rustfmt.toml), so `cargo fmt --check` is intentionally
      # not gated here.
      - name: Test
        run: cargo test --workspace

      # The Postgres adapter is a real DB adapter: exercise it against the service
      # above via the (otherwise #[ignore]d) pg_live round-trip. Scoped to that
      # test so the other #[ignore]d tests (R2/Drive/experiments) stay skipped.
      - name: Test (postgres adapter)
        env:
          CHUK_TRAIN_STORE: postgresql://postgres:test@localhost:5432/chuktest
        run: cargo test -p chuk-train-controlplane pg_live -- --ignored

  # chuk-compute M2: build the worker for every distributed target (the
  # SUPPORTED_TARGETS matrix). Linux-musl via cargo-zigbuild; darwin natively on
  # a macOS runner. Uploads each binary as an artifact for the release / image.
  build-targets:
    name: worker (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            zig: true
          - target: aarch64-apple-darwin
            os: macos-latest
            zig: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # cargo-zigbuild needs the `zig` binary on PATH; the `ziglang` pip package
      # only exposes `python -m ziglang` (a `python-zig` shim), which it can't
      # find. Use the dedicated setup action so a real `zig` is on PATH.
      - name: Install zig
        if: matrix.zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        if: matrix.zig
        run: cargo install cargo-zigbuild --locked

      - name: Build worker
        run: |
          if [ "${{ matrix.zig }}" = "true" ]; then
            cargo zigbuild --release -p chuk-compute-worker --target ${{ matrix.target }}
          else
            cargo build --release -p chuk-compute-worker --target ${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/chuk-compute-worker

  # Production deploy to Fly. Runs only on a push to main, gated on clippy + tests.
  # It deliberately does NOT depend on build-targets: the deploy image self-builds
  # the x86_64-musl worker via musl-tools (deploy/Dockerfile), so it never needs
  # the zig-based distribution artifacts — coupling prod releases to flaky zig
  # mirrors would be wrong. Needs the FLY_API_TOKEN repo secret.
  deploy:
    name: fly deploy
    needs: [check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy -c deploy/fly.toml --dockerfile deploy/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # The hosted MCP surface (chuk-train-mcp.fly.dev/mcp) — a zero-credential
      # per-caller bearer proxy over the control plane deployed above.
      - name: Deploy MCP server
        run: flyctl deploy -c deploy/mcp/fly.toml --dockerfile deploy/mcp/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
