# chuk-mcp-training control plane (spec §13).
# Deploy from the repo root:
#   fly deploy -c deploy/fly.toml --dockerfile deploy/Dockerfile

app = "chuk-mcp-training"
primary_region = "lhr"

[env]
# Metadata store is Neon (serverless Postgres), provided via `fly secrets` as
# CHUK_TRAIN_STORE=postgresql://…-pooler…?sslmode=require — so the control plane
# is stateless. (The /data volume mount below is legacy; no longer written.)
# Artifacts (checkpoints) live in R2, not on this box (spec §11.5). Set via
# `fly secrets` so the credentials stay off the repo:
#   fly secrets set CHUK_TRAIN_ARTIFACTS=r2://<bucket> \
#     CHUK_TRAIN_S3_ENDPOINT=https://<account>.r2.cloudflarestorage.com \
#     CHUK_TRAIN_S3_ACCESS_KEY_ID=... CHUK_TRAIN_S3_SECRET_ACCESS_KEY=...
# Also (already set): CHUK_TRAIN_PUBLIC_URL, CHUK_TRAIN_AGENT_WS_URL.

[http_service]
internal_port = 8700
force_https = true
# Agents hold an outbound websocket to us 24/7 — the machine must never sleep.
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[mounts]]
source = "chuk_train_data"
destination = "/data"
