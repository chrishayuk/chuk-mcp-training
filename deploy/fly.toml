# chuk-mcp-training control plane (spec §13).
# Deploy from the repo root:
#   fly deploy -c deploy/fly.toml --dockerfile deploy/Dockerfile

app = "chuk-mcp-training"
primary_region = "lhr"

[env]
CHUK_TRAIN_STORE = "sqlite:/data/chuk_train.db"
CHUK_TRAIN_ARTIFACTS = "file:/data/artifacts"
# Set after first deploy so artifact URLs + provisioned workers dial the real host:
#   fly secrets set CHUK_TRAIN_PUBLIC_URL=https://<app>.fly.dev \
#                   CHUK_TRAIN_AGENT_WS_URL=wss://<app>.fly.dev/ws/agent

[http_service]
internal_port = 8700
force_https = true
# Agents hold an outbound websocket to us 24/7 — the machine must never sleep.
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[mounts]]
source = "chuk_train_data"
destination = "/data"
